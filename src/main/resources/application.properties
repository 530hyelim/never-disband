# ===== 서버 =====
server.port=8080

# ===== JSP 뷰 설정 =====
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ===== 데이터베이스 =====
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=60000

# ===== Discord OAuth =====
discord.client-id=${DISCORD_CLIENT_ID}
discord.client-secret=${DISCORD_CLIENT_SECRET}
discord.redirect-uri=${DISCORD_REDIRECT_URI}
discord.bot-token=${DISCORD_BOT_TOKEN}
discord.bot-redirect-uri=${DISCORD_BOT_REDIRECT_URI}

# ===== 환경 =====
app.env=${APP_ENV}

# ===== 로깅 =====
logging.level.com.neverdisband=DEBUG
